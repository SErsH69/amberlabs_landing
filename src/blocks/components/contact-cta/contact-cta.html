<section class="contact-cta" id="cooperation">
    <div class="contact-cta__inner center_block">
        <div class="contact-cta__grid">
            <div class="contact-cta__left">
                <div class="contact-cta__title">Свяжитесь с нами</div>
                <div class="contact-cta__subtitle">Чтобы обсудить детали</div>

                <div class="contact-cta__form cf7-form">
                    <div class="contact-cta__field">
                        <div class="contact-cta__label">Ваше имя</div>
                        <span class="wpcf7-form-control-wrap" data-name="your-name">
                            <input class="contact-cta__input" type="text" name="your-name" value="" placeholder="Ваше имя">
                        </span>
                    </div>

                    <div class="contact-cta__field">
                        <div class="contact-cta__label">Номер телефона</div>
                        <span class="wpcf7-form-control-wrap" data-name="your-phone">
                            <input class="contact-cta__input" type="tel" name="your-phone" value="" placeholder="+7 (999) 999-99-99" inputmode="tel">
                        </span>
                    </div>

                    <div class="contact-cta__field">
                        <div class="contact-cta__label">Ваша почта</div>
                        <span class="wpcf7-form-control-wrap" data-name="your-email">
                            <input class="contact-cta__input" type="email" name="your-email" value="" placeholder="Введите почту">
                        </span>
                    </div>

                    <div class="contact-cta__submit-wrap">
                        <button class="contact-cta__submit" type="submit">Отправить</button>
                    </div>
                </div>
            </div>

            <div class="contact-cta__right">
                <div class="contact-cta__contacts">
                    <div class="contact-cta__contacts-line">amberlabs.ru</div>
                    <a class="contact-cta__contacts-line" href="mailto:info@amberlabs.ru">info@amberlabs.ru</a>
                </div>

                <div class="contact-cta__map">
                    <iframe
                        class="contact-cta__map-frame"
                        src="https://yandex.ru/map-widget/v1/?ll=37.618423%2C55.751244&mode=search&pt=37.618423%2C55.751244%2Cpm2orgm&z=11"
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Карта с отметкой"
                    ></iframe>
                </div>
            </div>
        </div>
    </div>
</section>
